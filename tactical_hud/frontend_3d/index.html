<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurum-9: Tactical HUD</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Hide scrollbars for the 3D canvas */
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }
        
        #overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff00;
            pointer-events: none; /* Let clicks pass through to the 3D scene */
            text-shadow: 0 0 5px #00ff00;
        }

        h1 { margin: 0; font-size: 24px; }
        p { margin: 5px 0 0 0; font-size: 14px; }

        /* --- NEW: Terminal Console Styles --- */
        #console-log {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 85%; /* Scaled for mobile */
            max-width: 450px;
            height: 150px;
            background: rgba(0, 15, 0, 0.7);
            border: 1px solid #005500;
            box-shadow: 0 0 10px #00ff0033;
            color: #00ff00;
            font-size: 12px;
            overflow-y: auto; /* Allow scrolling */
            padding: 10px;
            pointer-events: auto; 
        }

        /* Scrollbar styling for a cleaner look */
        #console-log::-webkit-scrollbar { width: 5px; }
        #console-log::-webkit-scrollbar-thumb { background: #00ff00; }

        .log-entry { margin-bottom: 4px; line-height: 1.3; }
        .log-critical { color: #ff3333; font-weight: bold; text-shadow: 0 0 5px #ff0000; }
        .log-warning { color: #ffcc00; }
        .log-info { color: #00ff00; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="overlay">
        <h1>AURUM-9: TACTICAL HUD</h1>
        <p>SYSTEM: <span style="color: #00ff00;">OPERATIONAL</span></p>
    </div>

    <div id="console-log"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
